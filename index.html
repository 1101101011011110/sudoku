<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sudoku Solver</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <h1>Sudoku Solver</h1>
    <div class="sudoku-wrapper">
      <div class="sudoku-grid" id="sudokuGrid" aria-label="Sudoku puzzle grid">
        <!-- 9 boxes, each 3x3 -->
        <!-- Boxes 0-2 (top row), 3-5 (middle), 6-8 (bottom) -->
      </div>
    </div>
    <div class="toolbar">
      <button type="button" id="resetBtn">Reset</button>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
